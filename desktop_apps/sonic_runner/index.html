<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DD1 Sonic Runner | High-End Synthwave Experience</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;800&display=swap" rel="stylesheet">
</head>
<body>
    <div id="game-ui">
        <div class="score-container">
            <span class="label">SCORE</span>
            <span id="score">00000</span>
        </div>
        <div class="message-container hidden" id="overlay">
            <h1 id="status-text">GAME OVER</h1>
            <p>Space veya Tıkla — Tekrar Başla</p>
        </div>
    </div>
    <canvas id="gameCanvas"></canvas>
    
    <div class="controls-hint">SPACE: ZIPLA | MOUSE: ZIPLA</div>

    <script src="game.js"></script>
</body>
</html>
