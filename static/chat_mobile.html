<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>DD1 Ses Ustası</title>
<style>
  :root {
    --bg:      #0f1117;
    --surface: #1a1d27;
    --bubble-ai: #1e2d40;
    --bubble-user: #2563eb;
    --text:    #e8eaf0;
    --text2:   #8b92a8;
    --accent:  #3b82f6;
    --border:  rgba(255,255,255,0.08);
    --input-bg:#1a1d27;
    --green:   #22c55e;
    --red:     #ef4444;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── Header ── */
  header {
    display: flex;
    align-items: center;
    gap: .75rem;
    padding: .9rem 1rem;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    z-index: 10;
    flex-shrink: 0;
  }
  .avatar {
    width: 38px; height: 38px;
    border-radius: 50%;
    background: linear-gradient(135deg, #1d4ed8 0%, #7c3aed 100%);
    display: flex; align-items: center; justify-content: center;
    font-size: 1.1rem;
    flex-shrink: 0;
  }
  .header-info h1 { font-size: .95rem; font-weight: 700; }
  .header-info p  { font-size: .72rem; color: var(--text2); }
  .status-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--green);
    margin-left: auto;
    flex-shrink: 0;
    box-shadow: 0 0 6px var(--green);
  }
  .status-dot.offline { background: var(--red); box-shadow: 0 0 6px var(--red); }
  #resetBtn {
    background: none;
    border: 1px solid var(--border);
    color: var(--text2);
    border-radius: 8px;
    padding: .3rem .6rem;
    font-size: .72rem;
    cursor: pointer;
    transition: all .15s;
  }
  #resetBtn:hover { border-color: var(--accent); color: var(--accent); }

  /* ── Mesaj Alanı ── */
  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 1rem .8rem;
    display: flex;
    flex-direction: column;
    gap: .6rem;
    scroll-behavior: smooth;
  }
  #messages::-webkit-scrollbar { width: 3px; }
  #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  .msg {
    max-width: 82%;
    padding: .6rem .85rem;
    border-radius: 16px;
    font-size: .88rem;
    line-height: 1.5;
    word-break: break-word;
    animation: pop .18s ease;
  }
  @keyframes pop {
    from { opacity: 0; transform: scale(.96) translateY(4px); }
    to   { opacity: 1; transform: scale(1)  translateY(0); }
  }
  .msg.user {
    background: var(--bubble-user);
    align-self: flex-end;
    border-bottom-right-radius: 4px;
  }
  .msg.ai {
    background: var(--bubble-ai);
    align-self: flex-start;
    border-bottom-left-radius: 4px;
    border: 1px solid var(--border);
  }
  .msg-label {
    font-size: .65rem;
    font-weight: 700;
    letter-spacing: .04em;
    text-transform: uppercase;
    margin-bottom: .25rem;
    color: var(--accent);
  }

  /* Typing indicator */
  .typing {
    display: inline-flex;
    gap: 4px;
    align-items: center;
    padding: .5rem .75rem;
    background: var(--bubble-ai);
    border-radius: 16px;
    border-bottom-left-radius: 4px;
    align-self: flex-start;
    border: 1px solid var(--border);
  }
  .typing span {
    width: 7px; height: 7px;
    background: var(--text2);
    border-radius: 50%;
    animation: bounce .9s infinite;
  }
  .typing span:nth-child(2) { animation-delay: .15s; }
  .typing span:nth-child(3) { animation-delay: .30s; }
  @keyframes bounce {
    0%,60%,100% { transform: translateY(0); }
    30%          { transform: translateY(-6px); }
  }

  /* ── Input Alanı ── */
  #inputArea {
    display: flex;
    align-items: flex-end;
    gap: .5rem;
    padding: .65rem .8rem;
    padding-bottom: calc(.65rem + env(safe-area-inset-bottom));
    background: var(--surface);
    border-top: 1px solid var(--border);
    flex-shrink: 0;
  }
  #chatInput {
    flex: 1;
    background: var(--input-bg);
    border: 1px solid var(--border);
    border-radius: 22px;
    padding: .65rem 1rem;
    color: var(--text);
    font-size: .9rem;
    font-family: inherit;
    resize: none;
    max-height: 130px;
    overflow-y: auto;
    outline: none;
    transition: border-color .15s;
    line-height: 1.4;
  }
  #chatInput:focus { border-color: var(--accent); }
  #chatInput::placeholder { color: var(--text2); }
  #sendBtn {
    width: 42px; height: 42px;
    border-radius: 50%;
    background: var(--accent);
    border: none;
    color: #fff;
    font-size: 1.1rem;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: transform .12s, background .15s;
    align-self: flex-end;
  }
  #sendBtn:active { transform: scale(.9); }
  #sendBtn:disabled { background: var(--border); cursor: default; }
</style>
</head>
<body>

<!-- Header -->
<header>
  <div class="avatar">⚡</div>
  <div class="header-info">
    <h1>DD1 Ses Ustası</h1>
    <p id="statusText">Bağlanıyor...</p>
  </div>
  <button id="resetBtn" onclick="resetChat()">↺ Sıfırla</button>
  <div class="status-dot offline" id="statusDot"></div>
</header>

<!-- Mesajlar -->
<div id="messages"></div>

<!-- Input -->
<div id="inputArea">
  <textarea id="chatInput" placeholder="Mesaj yaz..." rows="1"
    oninput="autoResize(this)"></textarea>
  <button id="sendBtn" onclick="send()">➤</button>
</div>

<script>
// ── Config ────────────────────────────────────────────────────────────────────
// API aynı sunucudan geldiği için window.location.origin kullan
// Telefon: http://192.168.x.x:PORT/static/chat_mobile.html → API: http://192.168.x.x:PORT
const API = window.location.origin;


// ── State ─────────────────────────────────────────────────────────────────────
let history = [];
let ci = {};
let busy = false;

// ── Başlangıç ─────────────────────────────────────────────────────────────────
window.addEventListener('load', () => {
  checkServer();
  addMsg('ai', '⚡ *DD1 Ses Ustası* burada.\n\nAraç tipini, sürücüyü ve ne istediğini söyle.');
});

async function checkServer() {
  try {
    await fetch(API + '/docs', { signal: AbortSignal.timeout(3000) });
    setStatus(true);
  } catch {
    setStatus(false);
  }
}

function setStatus(online) {
  const dot  = document.getElementById('statusDot');
  const text = document.getElementById('statusText');
  dot.className  = 'status-dot' + (online ? '' : ' offline');
  text.textContent = online ? 'Çevrimiçi' : 'Sunucu bağlantısı yok';
}

// ── Mesaj ─────────────────────────────────────────────────────────────────────
function addMsg(role, text) {
  const box = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'msg ' + role;
  if (role === 'ai') {
    div.innerHTML = `<div class="msg-label">⚡ Ses Ustası</div>${escHtml(text)}`;
  } else {
    div.textContent = text;
  }
  box.appendChild(div);
  box.scrollTop = box.scrollHeight;
  return div;
}

function escHtml(t) {
  return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
          .replace(/\n/g,'<br>').replace(/\*(.+?)\*/g,'<strong>$1</strong>');
}

function showTyping() {
  const box = document.getElementById('messages');
  const el = document.createElement('div');
  el.className = 'typing';
  el.id = 'typing';
  el.innerHTML = '<span></span><span></span><span></span>';
  box.appendChild(el);
  box.scrollTop = box.scrollHeight;
}
function removeTyping() {
  document.getElementById('typing')?.remove();
}

// ── Gönder ────────────────────────────────────────────────────────────────────
async function send() {
  if (busy) return;
  const inp = document.getElementById('chatInput');
  const msg = inp.value.trim();
  if (!msg) return;

  inp.value = '';
  inp.style.height = '';
  addMsg('user', msg);
  history.push({ role: 'user', content: msg });
  busy = true;
  document.getElementById('sendBtn').disabled = true;
  showTyping();

  try {
    const res = await fetch(API + '/chat/', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      signal: AbortSignal.timeout(20000),
      body: JSON.stringify({
        message: msg,
        context: {
          vehicle:         ci.vehicle_type  || null,
          driver_info:     ci.driver_info   || null,
          goal:            ci.goal          || null,
          trunk_width_cm:  ci.trunk_width_cm || null,
          trunk_height_cm: ci.trunk_height_cm || null,
          trunk_depth_cm:  ci.trunk_depth_cm || null,
        },
        history: history.slice(0, -1).slice(-20),
      })
    });

    const data = await res.json();
    removeTyping();

    // CI güncelle
    const panel = data.normalized_panel || {};
    ['vehicle_type','goal','trunk_width_cm','trunk_height_cm','trunk_depth_cm'].forEach(k => {
      if (panel[k]) ci[k] = panel[k];
    });

    const reply = data.user_visible_response || data.reply || '...';
    addMsg('ai', reply);
    history.push({ role: 'assistant', content: reply });
    setStatus(true);

  } catch (e) {
    removeTyping();
    addMsg('ai', '🔌 Sunucuya ulaşamıyorum. DD1 çalışıyor mu?');
    setStatus(false);
  }

  busy = false;
  document.getElementById('sendBtn').disabled = false;
  document.getElementById('chatInput').focus();
}

function resetChat() {
  history = [];
  ci = {};
  document.getElementById('messages').innerHTML = '';
  addMsg('ai', '🔄 Sıfırlandı. Yeniden anlat.');
}

// ── Yardımcılar ───────────────────────────────────────────────────────────────
document.getElementById('chatInput').addEventListener('keydown', e => {
  // Masa üstü: Enter gönder, Shift+Enter yeni satır
  if (e.key === 'Enter' && !e.shiftKey && window.innerWidth > 600) {
    e.preventDefault();
    send();
  }
});

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 130) + 'px';
}
</script>
</body>
</html>
